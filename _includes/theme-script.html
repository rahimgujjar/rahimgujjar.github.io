<script>
  /* ==========================================
     UI State Manager: Theme Initialization
     ========================================== */
  // Executes immediately to prevent UI state flashing during DOM load
  (function() {
    const html = document.documentElement;
    const body = document.body;
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    body.setAttribute('data-theme', savedTheme);
  })();

  /* ==========================================
     Event Listener: Theme Toggle Interaction
     ========================================== */
  document.addEventListener('DOMContentLoaded', function() {
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const html = document.documentElement;
    const body = document.body;

    // Retrieve active state from local storage or fallback to light mode
    const currentTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', currentTheme);
    body.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    // Intercept user interaction on the toggle switch
    if (themeToggle) {
      themeToggle.addEventListener('click', function() {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

        // Apply and commit the new UI state to local storage
        html.setAttribute('data-theme', newTheme);
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
      });
    }

    // Dynamic icon state injector
    function updateThemeIcon(theme) {
      if (themeIcon) {
        themeIcon.textContent = theme === 'dark' ? '☼' : '☾';
      }

      // Dynamic text state injector for the label
      const themeStatus = document.getElementById('theme-status');
      if (themeStatus) {
        themeStatus.textContent = theme === 'dark' ? 'Dark' : 'Light';
      }
    }
  });
</script>
