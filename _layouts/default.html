<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <!-- Keep these meta tags for SEO -->
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">

  <!-- Favicon: Hardcoded absolute paths to ensure they load on every repository -->
  <link rel="icon" type="image/png" href="https://rahimgujjar.github.io/favicon.png">
  <link rel="shortcut icon" type="image/png" href="https://rahimgujjar.github.io/favicon.png">
  <link rel="apple-touch-icon" href="https://rahimgujjar.github.io/favicon.png">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- MASTODON VERIFICATION LINK -->
  <link rel="me" href="https://infosec.exchange/@Rahim_Gujjar">
</head>
<body>
  {% include header.html %}

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}
  {% include theme-script.html %}
</body>
</html>
