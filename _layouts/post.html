---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta-header">
      <!-- Only pulls the standard date -->
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <!-- Reusing your home screen CSS (.hero-links) for the buttons -->
    <div class="hero-links" style="justify-content: space-between; width: 100%; margin-top: 0;">
      
      <!-- Acts as a dynamic back button based on browser history -->
      <a href="javascript:history.back()">← Back</a>
      
      <!-- Static link to the archive -->
      <a href="https://rahimgujjar.github.io/research/">View all research articles →</a>

      <!-- Commented out Related Posts logic for future centralized implementation -->
    <!--
    <div class="related-posts">
      {% assign max_related = 3 %}
      {% assign min_common_tags = 1 %}
      {% assign max_count = 0 %}
      ... (Complex dynamic liquid logic requires the posts to exist in the same repo) ...
    </div>
    -->
      
    </div>
  </footer>
</article>
